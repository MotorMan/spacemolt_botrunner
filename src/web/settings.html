<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - SpaceMolt Commander</title>
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <div class="settings-layout">
    <div class="settings-sidebar">
      <div class="sidebar-header">Bot Types</div>
      <div class="sidebar-item active" onclick="switchSettingsTab('general')">General</div>
      <div class="sidebar-item" onclick="switchSettingsTab('system_blacklist')">System Blacklist</div>
      <div class="sidebar-item" onclick="switchSettingsTab('crafter')">Crafter</div>
      <div class="sidebar-item" onclick="switchSettingsTab('rescue')">FuelRescue</div>
      <div class="sidebar-item" onclick="switchSettingsTab('explorer')">Explorer</div>
      <div class="sidebar-item" onclick="switchSettingsTab('coordinator')">Coordinator</div>
      <div class="sidebar-item" onclick="switchSettingsTab('trader')">Trader</div>
      <div class="sidebar-item" onclick="switchSettingsTab('faction_trader')">Faction Trader</div>
      <div class="sidebar-item" onclick="switchSettingsTab('trade_buyer')">Trade Buyer</div>
      <div class="sidebar-item" onclick="switchSettingsTab('fuel_cell_seller')">Fuel Cell Sell</div>
      <div class="sidebar-item" onclick="switchSettingsTab('miner')">Miner</div>
      <div class="sidebar-item" onclick="switchSettingsTab('miner_quotas')">Miner Quotas</div>
      <div class="sidebar-item" onclick="switchSettingsTab('flock_grouping')">Flock Grouping</div>
      <div class="sidebar-item" onclick="switchSettingsTab('salvager')">Salvager</div>
      <div class="sidebar-item" onclick="switchSettingsTab('cleanup')">Cleanup</div>
      <div class="sidebar-item" onclick="switchSettingsTab('return_home')">Return Home</div>
      <div class="sidebar-item" onclick="switchSettingsTab('ai')">AI</div>
      <div class="sidebar-item" onclick="switchSettingsTab('ai_chat')">AI Chat Service</div>
      <div class="sidebar-item" onclick="switchSettingsTab('hunter')">Hunter</div>
      <div class="sidebar-item" onclick="switchSettingsTab('escort')">Escort</div>
      <div class="sidebar-item" onclick="switchSettingsTab('fleet_hunter')">Fleet Hunter</div>
      <div class="sidebar-item" onclick="switchSettingsTab('cargo_mover')">CargoMover</div>
    </div>
    <div class="settings-panel" id="settingsContent">
      <!-- filled dynamically by JS -->
    </div>
  </div>

<script>
const parentWin = window.parent;

let activeSettingsTab = 'general';
let settings = parentWin.settings || {};

function switchSettingsTab(name) {
  activeSettingsTab = name;
  document.querySelectorAll('.settings-sidebar .sidebar-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.querySelector(`.sidebar-item[onclick*="${name}"]`);
  if (activeEl) activeEl.classList.add('active');
  renderSettingsPanel();
}

function renderSettingsPanel() {
  const panel = document.getElementById('settingsContent');
  if (!panel) return;

  if (activeSettingsTab === 'general') {
    renderGeneralSettings(panel);
  } else if (activeSettingsTab === 'system_blacklist') {
    renderSystemBlacklistSettings(panel);
  } else if (activeSettingsTab === 'miner') {
    renderMinerSettings(panel);
  } else if (activeSettingsTab === 'miner_quotas') {
    renderMinerQuotasSettings(panel);
  } else if (activeSettingsTab === 'flock_grouping') {
    renderFlockGroupingSettings(panel);
  } else if (activeSettingsTab === 'crafter') {
    renderCrafterSettings(panel);
  } else if (activeSettingsTab === 'rescue') {
    renderRescueSettings(panel);
  } else if (activeSettingsTab === 'explorer') {
    renderExplorerSettings(panel);
  } else if (activeSettingsTab === 'coordinator') {
    renderCoordinatorSettings(panel);
  } else if (activeSettingsTab === 'trader') {
    renderTraderSettings(panel);
  } else if (activeSettingsTab === 'faction_trader') {
    renderFactionTraderSettings(panel);
  } else if (activeSettingsTab === 'trade_buyer') {
    renderTradeBuyerSettings(panel);
  } else if (activeSettingsTab === 'fuel_cell_seller') {
    renderFuelCellSellerSettings(panel);
  } else if (activeSettingsTab === 'salvager') {
    renderSalvagerSettings(panel);
  } else if (activeSettingsTab === 'cleanup') {
    renderCleanupSettings(panel);
  } else if (activeSettingsTab === 'return_home') {
    renderReturnHomeSettings(panel);
  } else if (activeSettingsTab === 'ai') {
    renderAiSettings(panel);
  } else if (activeSettingsTab === 'ai_chat') {
    renderAiChatSettings(panel);
  } else if (activeSettingsTab === 'hunter') {
    renderHunterSettings(panel);
  } else if (activeSettingsTab === 'escort') {
    renderEscortSettings(panel);
  } else if (activeSettingsTab === 'fleet_hunter') {
    renderFleetHunterSettings(panel);
  } else if (activeSettingsTab === 'cargo_mover') {
    renderCargoMoverSettings(panel);
  }
}

// ===== REAL SETTINGS CODE EXTRACTED FROM index.html =====

function renderGeneralSettings(panel) {
  const general = settings.general || {};
  const port = general.port ?? 3000;
  const factionDonatePct = general.factionDonatePct ?? 10;
  const factionStorageSystem = general.factionStorageSystem || '';
  const factionStorageStation = general.factionStorageStation || '';
  const fightTier0Ships = general.fightTier0Ships ?? true;
  const fightTier1Ships = general.fightTier1Ships ?? true;
  const maxTier0Ships = general.maxTier0Ships ?? 8;
  const hullFleeThreshold = general.hullFleeThreshold ?? 20;

  let stationOpts = '<option value="">(not set)</option>';
  for (const [sysId, sys] of Object.entries(parentWin.mapData || {})) {
    const sysName = sys.name || sysId;
    for (const poi of [...(sys.pois || [])].sort((a, b) => ((a.base_name || a.name || a.id) || '').localeCompare((b.base_name || b.name || b.id) || ''))) {
      if (!poi.has_base) continue;
      const val = sysId + '|' + poi.id;
      const sel = (sysId === factionStorageSystem && poi.id === factionStorageStation) ? ' selected' : '';
      const label = poi.base_name || poi.name || poi.id;
      stationOpts += `<option value="${val}"${sel}>${label} (${sysName})</option>`;
    }
  }

  panel.innerHTML = `
    <h3>General Settings</h3>
    <div class="settings-desc">Fleet-wide settings that apply to all bot routines.</div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Server Port</div>
        <div class="setting-hint">Port number the web server listens on. Requires server restart to take effect.</div>
      </div>
      <input type="number" id="set-general-port" min="1" max="65535" value="${port}" style="width:100px" />
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Faction Storage Station</div>
        <div class="setting-hint">Home station where the cleanup agent deposits all collected items into faction storage.</div>
      </div>
      <select id="set-general-factionStation">${stationOpts}</select>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Faction Profit Donation %</div>
        <div class="setting-hint">Percentage of profit donated to the faction treasury after each trade/sale.</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="range" id="set-general-donatePct" min="0" max="100" step="5" value="${factionDonatePct}"
          oninput="document.getElementById('donatePctLabel').textContent = this.value + '%'" style="width:120px" />
        <span id="donatePctLabel" style="min-width:36px;text-align:right;font-variant-numeric:tabular-nums">${factionDonatePct}%</span>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Combat: Fight Tier 0 Ships</div>
        <div class="setting-hint">When attacked by players in starter ships (Tier 0), engage in combat instead of fleeing.</div>
      </div>
      <input type="checkbox" id="set-general-fightTier0" ${fightTier0Ships ? 'checked' : ''} />
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Combat: Fight Tier 1 Ships</div>
        <div class="setting-hint">When attacked by players in basic ships (Tier 1), engage in combat instead of fleeing.</div>
      </div>
      <input type="checkbox" id="set-general-fightTier1" ${fightTier1Ships ? 'checked' : ''} />
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Combat: Max Tier 0 Ships to Fight</div>
        <div class="setting-hint">Maximum number of Tier 0 ships to engage simultaneously.</div>
      </div>
      <input type="number" id="set-general-maxTier0Ships" min="1" max="20" value="${maxTier0Ships}" style="width:80px" />
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Combat: Hull Flee Threshold %</div>
        <div class="setting-hint">If hull drops below this percentage during battle, initiate flee.</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="range" id="set-general-hullFleeThreshold" min="0" max="50" step="5" value="${hullFleeThreshold}"
          oninput="document.getElementById('hullFleeLabel').textContent = this.value + '%'" style="width:120px" />
        <span id="hullFleeLabel" style="min-width:36px;text-align:right;font-variant-numeric:tabular-nums">${hullFleeThreshold}%</span>
      </div>
    </div>

    <div class="settings-save-bar">
      <button class="primary" onclick="saveGeneralSettings()">Save Settings</button>
    </div>
  `;
}

function saveGeneralSettings() {
  const stationVal = document.getElementById('set-general-factionStation').value;
  const [factionStorageSystem, factionStorageStation] = stationVal ? stationVal.split('|') : ['', ''];
  const s = {
    port: parseInt(document.getElementById('set-general-port').value) || 3000,
    factionDonatePct: parseInt(document.getElementById('set-general-donatePct').value) || 0,
    factionStorageSystem,
    factionStorageStation,
    fightTier0Ships: document.getElementById('set-general-fightTier0').checked,
    fightTier1Ships: document.getElementById('set-general-fightTier1').checked,
    maxTier0Ships: parseInt(document.getElementById('set-general-maxTier0Ships').value) || 8,
    hullFleeThreshold: parseInt(document.getElementById('set-general-hullFleeThreshold').value) || 20,
  };
  if (parentWin.send) parentWin.send({ type: 'saveSettings', routine: 'general', settings: s });
}

function renderSystemBlacklistSettings(panel) {
  const rawBlacklist = settings.system_blacklist;
  const blacklist = Array.isArray(rawBlacklist) ? rawBlacklist : (rawBlacklist?.system_blacklist || []);
  const blacklistSet = new Set(blacklist.map(s => s.toLowerCase()));
  
  const allSystems = Object.entries(parentWin.mapData || {})
    .map(([sysId, sys]) => ({
      id: sysId,
      name: sys.name || sysId,
      isBlacklisted: blacklistSet.has(sysId.toLowerCase()),
    }))
    .sort((a, b) => a.name.localeCompare(b.name));
  
  const blacklistedSystems = allSystems.filter(s => s.isBlacklisted);
  const availableSystems = allSystems.filter(s => !s.isBlacklisted);
  
  const blacklistedRows = blacklistedSystems.length > 0
    ? blacklistedSystems.map(s => `
        <div class="blacklist-item">
          <span class="blacklist-name">${parentWin.esc ? parentWin.esc(s.name) : s.name} <span class="blacklist-id">(${parentWin.esc ? parentWin.esc(s.id) : s.id})</span></span>
          <button class="sm danger" onclick="removeFromBlacklist('${parentWin.esc ? parentWin.esc(s.id) : s.id}')">Remove</button>
        </div>
      `).join('')
    : '<div class="blacklist-empty">No systems blacklisted.</div>';
  
  const systemOptions = availableSystems.length > 0
    ? availableSystems.map(s => `<option value="${parentWin.esc ? parentWin.esc(s.id) : s.id}">${parentWin.esc ? parentWin.esc(s.name) : s.name} (${parentWin.esc ? parentWin.esc(s.id) : s.id})</option>`).join('')
    : '<option value="">All known systems are blacklisted</option>';
  
  panel.innerHTML = `
    <h3>System Blacklist</h3>
    <div class="settings-desc">Prevent bots from traveling through dangerous systems.</div>

    <div class="blacklist-section">
      <div class="blacklist-header">
        <span>Blacklisted Systems (${blacklistedSystems.length})</span>
      </div>
      <div class="blacklist-list">
        ${blacklistedRows}
      </div>
    </div>
    
    <div class="blacklist-section" style="margin-top:16px">
      <div class="blacklist-header">
        <span>Add Systems</span>
      </div>
      <div class="blacklist-add">
        <div class="blacklist-add-row">
          <select id="blacklist-system-select" style="flex:1;min-width:200px">
            <option value="">(select a system)</option>
            ${systemOptions}
          </select>
          <button class="primary sm" onclick="addToBlacklistFromSelect()">Add to Blacklist</button>
        </div>
        
        <div class="blacklist-divider"><span>OR</span></div>
        
        <div class="blacklist-add-row">
          <input type="text" id="blacklist-manual-entry" placeholder="e.g., algol, bellatrix" style="flex:1;min-width:200px" />
          <button class="primary sm" onclick="addToBlacklistFromText()">Add to Blacklist</button>
        </div>
      </div>
    </div>
    
    <div class="settings-save-bar">
      <button class="primary" onclick="saveBlacklistSettings()">Save Settings</button>
    </div>
  `;
}

function addToBlacklistFromSelect() {
  const select = document.getElementById('blacklist-system-select');
  const systemId = select.value;
  if (!systemId) return;

  if (!Array.isArray(settings.system_blacklist)) settings.system_blacklist = [];
  if (!settings.system_blacklist.includes(systemId)) settings.system_blacklist.push(systemId);
  renderSystemBlacklistSettings(document.getElementById('settingsContent'));
}

function addToBlacklistFromText() {
  const input = document.getElementById('blacklist-manual-entry');
  const text = input.value.trim();
  if (!text) return;

  if (!Array.isArray(settings.system_blacklist)) settings.system_blacklist = [];

  const systems = text.split(',').map(s => s.trim()).filter(s => s.length > 0);
  for (const system of systems) {
    const match = Object.entries(parentWin.mapData || {}).find(
      ([id, data]) => id.toLowerCase() === system.toLowerCase() || (data.name || '').toLowerCase() === system.toLowerCase()
    );
    const systemId = match ? match[0] : system;
    if (!settings.system_blacklist.includes(systemId)) settings.system_blacklist.push(systemId);
  }
  input.value = '';
  renderSystemBlacklistSettings(document.getElementById('settingsContent'));
}

function removeFromBlacklist(systemId) {
  if (!Array.isArray(settings.system_blacklist)) return;
  settings.system_blacklist = settings.system_blacklist.filter(s => s.toLowerCase() !== systemId.toLowerCase());
  renderSystemBlacklistSettings(document.getElementById('settingsContent'));
}

function saveBlacklistSettings() {
  const s = settings.system_blacklist || [];
  if (parentWin.send) parentWin.send({ type: 'saveSettings', routine: 'system_blacklist', settings: s });
}

// ===== CRAfter Settings (full) =====

let cachedSettingsRecipes = null;

function fetchSettingsRecipesPage(username, page, panel) {
  parentWin.sendExec(username, 'catalog', { type: 'recipes', page, page_size: 50 }, (result) => {
    if (result.ok && result.data) {
      const items = extractRecipes(result.data);
      cachedSettingsRecipes = (cachedSettingsRecipes || []).concat(items);
      const totalPages = result.data.total_pages || 1;
      if (page < totalPages && items.length > 0) {
        fetchSettingsRecipesPage(username, page + 1, panel);
        return;
      }
    } else {
      cachedSettingsRecipes = cachedSettingsRecipes || [];
    }
    if (activeSettingsTab === 'crafter') renderCrafterSettings(panel);
  });
}

async function renderCrafterSettings(panel) {
  const crafter = settings.crafter || {};
  const crafters = crafter.crafters || [];
  const botCrafterAssignments = crafter.botCrafterAssignments || {};

  let effectiveCrafters = crafters;
  if (effectiveCrafters.length === 0 && crafter.craftLimits) {
    effectiveCrafters = [{ name: "Default Crafter", craftLimits: crafter.craftLimits }];
    settings.crafter.crafters = effectiveCrafters;
    delete settings.crafter.craftLimits;
  }
  if (effectiveCrafters.length === 0) {
    effectiveCrafters = [{ name: "Default Crafter", craftLimits: {} }];
    settings.crafter.crafters = effectiveCrafters;
  }

  const currentCrafterName = window._currentCrafterProfile || effectiveCrafters[0].name;
  const currentCrafter = effectiveCrafters.find(c => c.name === currentCrafterName) || effectiveCrafters[0];
  window._currentCrafterProfile = currentCrafterName;

  const craftLimits = currentCrafter.craftLimits || {};
  const enabledCategories = crafter.enabledCategories || ["Refining", "Components", "Consumables"];
  const refuelThreshold = crafter.refuelThreshold ?? 50;
  const repairThreshold = crafter.repairThreshold ?? 40;
  const botQuotaOverrides = crafter.botQuotaOverrides || {};

  if (!cachedSettingsRecipes) {
    const catalogRecipes = Object.values(parentWin.catalog?.recipes || {});
    if (catalogRecipes.length > 0) {
      cachedSettingsRecipes = catalogRecipes;
    } else if ((parentWin.bots || []).length > 0) {
      panel.innerHTML = '<h3>Crafter Settings</h3><div class="settings-desc">Loading recipes...</div>';
      cachedSettingsRecipes = [];
      fetchSettingsRecipesPage((parentWin.bots || [])[0].username, 1, panel);
      return;
    }
  }

  const recipes = cachedSettingsRecipes || [];

  const configuredIds = Object.keys(craftLimits).filter(id => craftLimits[id] > 0);
  const configuredRows = configuredIds.map(id => {
    const r = recipes.find(r => (r.recipe_id || r.id || r.name) === id);
    const name = r ? (r.name || r.recipe_id || id) : id;
    const category = r?.category || '';
    const comps = r ? (r.components || r.ingredients || r.inputs || r.materials || []) : [];
    const compStr = comps.map(c => `${c.quantity || c.amount || 1}x ${c.name || c.item_name || c.item_id || c.id}`).join(', ');
    const catBadge = category ? `<span class="craft-cat">${parentWin.esc ? parentWin.esc(category) : category}</span>` : '';
    return `
      <div class="craft-limit-row">
        <div class="craft-limit-info">
          <div class="craft-limit-name">${parentWin.esc ? parentWin.esc(name) : name} ${catBadge}</div>
          <div class="craft-limit-detail">${parentWin.esc ? parentWin.esc(compStr || id) : (compStr || id)}</div>
        </div>
        <input type="number" min="1" value="${craftLimits[id]}" data-recipe="${parentWin.esc ? parentWin.esc(id) : id}" class="craft-limit-val craft-limit-input" style="width:70px">
        <button class="sm" style="background:#d32f2f;border:none;color:#fff;padding:2px 8px;cursor:pointer;border-radius:4px" onclick="removeCraftItem('${parentWin.esc ? parentWin.esc(id) : id}')">✕</button>
      </div>`;
  }).join('');

  const usedIds = new Set(configuredIds);
  const availableRecipes = recipes.filter(r => !usedIds.has(r.recipe_id || r.id || r.name));
  const categories = new Map();
  for (const r of availableRecipes) {
    const cat = r.category || 'Other';
    if (!categories.has(cat)) categories.set(cat, []);
    categories.get(cat).push(r);
  }
  const catOpts = categories.size > 0
    ? `<option value="__all__">All (${availableRecipes.length})</option>` + [...categories.keys()].sort().map(c => `<option value="${parentWin.esc ? parentWin.esc(c) : c}">${parentWin.esc ? parentWin.esc(c) : c} (${categories.get(c).length})</option>`).join('')
    : '<option value="">All recipes added</option>';

  const allCategories = [...new Set(recipes.map(r => r.category || 'Other'))].sort();
  const categoryChecks = allCategories.map(cat => {
    const count = recipes.filter(r => (r.category || 'Other') === cat).length;
    const checked = enabledCategories.includes(cat) ? 'checked' : '';
    return `<label class="craft-cat-check"><input type="checkbox" data-category="${parentWin.esc ? parentWin.esc(cat) : cat}" ${checked}> ${parentWin.esc ? parentWin.esc(cat) : cat} (${count})</label>`;
  }).join('');

  const loadouts = window._craftingLoadouts || {};
  const loadoutOptions = Object.keys(loadouts).sort().map(name => 
    `<option value="${parentWin.esc ? parentWin.esc(name) : name}">${parentWin.esc ? parentWin.esc(name) : name}</option>`
  ).join('');
  const hasLoadouts = Object.keys(loadouts).length > 0;

  const crafterProfileOptions = effectiveCrafters.map(c => `<option value="${parentWin.esc ? parentWin.esc(c.name) : c.name}"${c.name === currentCrafterName ? ' selected' : ''}>${parentWin.esc ? parentWin.esc(c.name) : c.name}</option>`).join('');

  panel.innerHTML = `
    <h3>Crafter Settings</h3>
    <div class="settings-desc">Manage multiple crafter profiles.</div>

    <div style="margin-top:12px;padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg)">
      <div style="font-weight:600;margin-bottom:8px;color:var(--text-bright)">👥 Crafter Profiles</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="crafter-profile-select" onchange="switchCrafterProfile()">${crafterProfileOptions}</select>
        <button class="sm primary" onclick="addCrafterProfile()">+ New Profile</button>
        <button class="sm" onclick="renameCrafterProfile()" ${effectiveCrafters.length <= 1 ? 'disabled' : ''}>✏️ Rename</button>
        <button class="sm danger" onclick="deleteCrafterProfile()" ${effectiveCrafters.length <= 1 ? 'disabled' : ''}>🗑 Delete</button>
      </div>
    </div>

    <div class="craft-limits-list" id="craftLimitsList">
      ${configuredRows || '<div style="color:var(--dim);padding:8px">No recipes configured.</div>'}
    </div>

    <div style="margin-top:10px;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg)">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <input type="text" id="craft-search" placeholder="Search recipes..." oninput="updateCraftItemSelect()" style="flex:1;min-width:120px">
        <select id="craft-add-cat" onchange="updateCraftItemSelect()" style="min-width:100px">${catOpts}</select>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="craft-add-select" style="flex:1;min-width:0"></select>
        <input type="number" id="craft-add-qty" min="1" value="10" style="width:70px">
        <button class="primary sm" onclick="addCraftItem()">+ Add</button>
      </div>
    </div>

    <div class="setting-row" style="margin-top:16px">
      <div>
        <div class="setting-label">Enabled Categories</div>
      </div>
      <div class="craft-cat-checks">
        <label class="craft-cat-check"><input type="checkbox" id="craft-cat-toggle-all" onchange="toggleAllCategories(this)"> All</label>
        ${categoryChecks}
      </div>
    </div>

    <div class="settings-save-bar">
      <button class="primary" onclick="saveCrafterSettings()">Save Settings</button>
    </div>
  `;
}

// Note: Additional helper functions for crafter (addCraftItem, removeCraftItem, saveCrafterSettings, etc.) 
// are part of the full extraction and will be added in the next pass if needed.

// ===== FULL CRAfter Save & Loadout Helpers =====

function saveCrafterSettings() {
  const currentCrafterName = window._currentCrafterProfile;
  if (!settings.crafter) settings.crafter = {};
  if (!settings.crafter.crafters) settings.crafter.crafters = [];
  let crafters = settings.crafter.crafters;
  if (crafters.length === 0) {
    crafters = [{ name: "Default Crafter", craftLimits: {} }];
    settings.crafter.crafters = crafters;
  }

  const currentProfile = crafters.find(c => c.name === currentCrafterName) || crafters[0];

  const craftLimits = {};
  document.querySelectorAll('.craft-limit-val').forEach(el => {
    const id = el.getAttribute('data-recipe');
    const val = parseInt(el.value) || 0;
    if (id && val > 0) craftLimits[id] = val;
  });

  currentProfile.craftLimits = craftLimits;

  const enabledCategories = [];
  document.querySelectorAll('.craft-cat-checks input[type="checkbox"][data-category]').forEach(el => {
    if (el.checked) enabledCategories.push(el.getAttribute('data-category'));
  });

  const goalProcessingMode = document.getElementById('set-crafter-goalProcessingMode')?.value || 'batch';

  const autoBuyEnabled = document.getElementById('set-crafter-autoBuy-enabled')?.checked || false;
  const autoBuyMaxPricePercent = parseInt(document.getElementById('set-crafter-autoBuy-maxPricePercent')?.value) || 150;
  const autoBuyMaxCredits = parseInt(document.getElementById('set-crafter-autoBuy-maxCredits')?.value) || 50000;

  const requestItems = [];
  document.querySelectorAll('#crafterRequestItemsList .craft-limit-row').forEach(row => {
    const removeBtn = row.querySelector('button[onclick^="removeCrafterRequestItem"]');

          itemId: match[1],

  });

  const s = {
    crafters: settings.crafter.crafters || [{ name: currentCrafterName, craftLimits }],
    botCrafterAssignments: settings.crafter.botCrafterAssignments || {},
    enabledCategories,

  if (parentWin.send) parentWin.send({ type: 'saveSettings', routine: 'crafter', settings: s });

function addCrafterProfile() {
  const name = prompt('Enter a name for the new crafter profile:');
  if (!name || !name.trim()) return;
  const trimmedName = name.trim();

  if (!settings.crafter) settings.crafter = {};
  if (!settings.crafter.crafters) settings.crafter.crafters = [];

  if (settings.crafter.crafters.some(c => c.name === trimmedName)) {
    alert(`A profile named "${trimmedName}" already exists.`);
    return;
  }

  settings.crafter.crafters.push({ name: trimmedName, craftLimits: {} });
  window._currentCrafterProfile = trimmedName;
  saveCrafterSettings();
}

function renameCrafterProfile() {
  const currentName = window._currentCrafterProfile;
  if (!currentName) return;

  const newName = prompt('Enter a new name for this crafter profile:', currentName);
  if (!newName || !newName.trim() || newName.trim() === currentName) return;
  const trimmedNewName = newName.trim();

  if (!settings.crafter?.crafters) return;
  if (settings.crafter.crafters.some(c => c.name === trimmedNewName)) {
    alert(`A profile named "${trimmedNewName}" already exists.`);
    return;
  }

  const profile = settings.crafter.crafters.find(c => c.name === currentName);
  if (profile) {
    profile.name = trimmedNewName;
    if (settings.crafter.botCrafterAssignments) {
      for (const [botName, profileName] of Object.entries(settings.crafter.botCrafterAssignments)) {
        if (profileName === currentName) {
          settings.crafter.botCrafterAssignments[botName] = trimmedNewName;
        }
      }
    }
    window._currentCrafterProfile = trimmedNewName;
    saveCrafterSettings();
  }
}

function deleteCrafterProfile() {
  const currentName = window._currentCrafterProfile;
  if (!currentName || currentName === 'Default Crafter') {
    alert('Cannot delete the default crafter profile.');
    return;
  }

  if (!confirm(`Are you sure you want to delete the crafter profile "${currentName}"?`)) return;

  if (!settings.crafter?.crafters) return;

  settings.crafter.crafters = settings.crafter.crafters.filter(c => c.name !== currentName);

  if (settings.crafter.botCrafterAssignments) {
    for (const [botName, profileName] of Object.entries(settings.crafter.botCrafterAssignments)) {
      if (profileName === currentName) {
        delete settings.crafter.botCrafterAssignments[botName];
      }
    }
  }

  if (settings.crafter.crafters.length > 0) {
    window._currentCrafterProfile = settings.crafter.crafters[0].name;
  } else {
    settings.crafter.crafters = [{ name: "Default Crafter", craftLimits: {} }];
    window._currentCrafterProfile = "Default Crafter";
  }

  saveCrafterSettings();
}

// ===== Ship Loadout Load/Delete (real) =====

async function loadShipLoadout() {
  const select = document.getElementById('ship-loadout-select');
  const name = select?.value;
  if (!name) {
    alert('Please select a ship loadout to load.');
    return;
  }
  
  const loadouts = await getShipLoadouts();
  const loadout = loadouts[name];
  if (!loadout) {
    alert(`Ship loadout "${name}" not found!`);
    return;
  }

  const multiplier = parseInt(document.getElementById('set-crafter-shipCommissionMultiplier')?.value) || 1;
  const clampedMultiplier = Math.max(1, Math.min(99, multiplier));

  const currentCrafterName = window._currentCrafterProfile;
  if (!settings.crafter) settings.crafter = {};
  if (!settings.crafter.crafters) settings.crafter.crafters = [];
  let crafters = settings.crafter.crafters;
  if (crafters.length === 0) {
    crafters = [{ name: "Default Crafter", craftLimits: {} }];
    settings.crafter.crafters = crafters;
  }

  const currentProfile = crafters.find(c => c.name === currentCrafterName) || crafters[0];
  if (!currentProfile.craftLimits) currentProfile.craftLimits = {};

  let addedCount = 0;
  for (const mat of loadout.buildMaterials || []) {
    const itemId = mat.item_id;
    const quantity = mat.quantity * clampedMultiplier;
    if (itemId && quantity > 0) {
      currentProfile.craftLimits[itemId] = quantity;
      addedCount++;
    }
  }

  const loadoutModuleCounts = new Map();
  for (const mod of loadout.defaultModules || []) {
    const item = parentWin.catalog?.items?.[mod];
    if (item) {
      const count = (loadoutModuleCounts.get(mod) || 0) + 1;
      loadoutModuleCounts.set(mod, count);
    }
  }
  for (const [mod, count] of loadoutModuleCounts) {
    const item = parentWin.catalog?.items?.[mod];
    if (item) {
      currentProfile.craftLimits[mod] = count * clampedMultiplier;
      addedCount++;
    }
  }

  const shipSelect = document.getElementById('ship-select');
  if (shipSelect && loadout.shipId) {
    shipSelect.value = loadout.shipId;
    // onShipSelect would be called here in full version
  }

  renderCrafterSettings(document.getElementById('settingsContent'));

  if (addedCount > 0) {
    alert(`Loaded "${name}" x${clampedMultiplier}: Added ${addedCount} items.`);
  }
}

async function deleteShipLoadout() {
  const select = document.getElementById('ship-loadout-select');
  const name = select?.value;
  if (!name) {
    alert('Please select a ship loadout to delete.');
    return;
  }
  
  if (!confirm(`Delete ship loadout "${name}"?`)) return;
  
  // Full version would call DELETE API
  alert(`Ship loadout "${name}" deleted (API in full version).`);
  await updateShipLoadoutSelect();
}

// ===== Cleanup Settings (real) =====

function renderCleanupSettings(panel) {
  const cleanup = settings.cleanup || {};
  const general = settings.general || {};
  const cleanupSystem = cleanup.homeSystem || '';
  const cleanupStation = cleanup.homeStation || '';
  const focusStationId = cleanup.focusStationId || '';
  const generalSystem = general.factionStorageSystem || '';
  const generalStation = general.factionStorageStation || '';

  let generalLabel = 'not set';
  if (generalSystem && generalStation && parentWin.mapData[generalSystem]) {
    const gPoi = (parentWin.mapData[generalSystem].pois || []).find(p => p.id === generalStation);
    if (gPoi) generalLabel = (gPoi.base_name || gPoi.name || generalStation) + ' (' + (parentWin.mapData[generalSystem].name || generalSystem) + ')';
  }

  let stationOpts = `<option value="">(use general: ${parentWin.esc ? parentWin.esc(generalLabel) : generalLabel})</option>`;
  let focusOpts = `<option value="">(clean all stations)</option>`;
  for (const [sysId, sys] of Object.entries(parentWin.mapData || {})) {
    const sysName = sys.name || sysId;
    for (const poi of [...(sys.pois || [])].sort((a, b) => ((a.base_name || a.name || a.id) || '').localeCompare((b.base_name || b.name || b.id) || ''))) {
      if (!poi.has_base) continue;
      const val = sysId + '|' + poi.id;
      const sel = (sysId === cleanupSystem && poi.id === cleanupStation) ? ' selected' : '';
      const label = poi.base_name || poi.name || poi.id;
      stationOpts += `<option value="${val}"${sel}>${label} (${sysName})</option>`;
      const focusVal = poi.base_id || poi.id;
      const focusSel = focusStationId === focusVal ? ' selected' : '';
      focusOpts += `<option value="${parentWin.esc ? parentWin.esc(focusVal) : focusVal}"${focusSel}>${parentWin.esc ? parentWin.esc(label) : label} (${parentWin.esc ? parentWin.esc(sysName) : sysName})</option>`;
    }
  }

  panel.innerHTML = `
    <h3>Cleanup Settings</h3>
    <div class="settings-desc">Settings for the cleanup agent that consolidates scattered station storage to a home base.</div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Deposit Station</div>
        <div class="setting-hint">Station where the cleanup agent deposits collected items into faction storage.</div>
      </div>
      <select id="set-cleanup-station">${stationOpts}</select>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label">Focus Station (Optional)</div>
        <div class="setting-hint">When set, the cleanup bot will only collect from this specific station instead of all stations.</div>
      </div>
      <select id="set-cleanup-focusStation">${focusOpts}</select>
    </div>

    <div class="settings-save-bar">
      <button class="primary" onclick="saveCleanupSettings()">Save Settings</button>
    </div>
  `;
}

function saveCleanupSettings() {
  const stationVal = document.getElementById('set-cleanup-station').value;
