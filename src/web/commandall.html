<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command All - SpaceMolt Commander</title>
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <div class="commandall-layout">
    <div class="commandall-header">
      <h3>Command All Bots</h3>
      <p style="color:var(--text-dim);font-size:12px;margin:4px 0 0 0">
        Send commands to all bots simultaneously. Commands will be executed with a 250ms delay between each bot.
      </p>
    </div>
    <div class="commandall-body">
      <div class="manual-panel" style="width:100%">
        <div class="manual-header">Fleet-Wide Manual Control</div>
        <div class="manual-body" id="commandAllControls">
          <!-- filled by JS -->
        </div>
      </div>
      <div class="response-panel" style="width:100%">
        <div class="response-header">
          <span>Fleet Command Log</span>
          <button onclick="clearCommandAllLog()">Clear</button>
        </div>
        <div class="response-log" id="commandAllLog"></div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────
    let ws = null;
    let bots = [];
    let routines = [];
    let settings = {};
    let knownSystems = [];
    let knownOres = [];
    let mobileCapitol = null;     // { systemId, systemName, poiId, discoveredAt }
    let reconnectDelay = 1000;
    let mapData = {};
    let modalMode = 'add';
    let activeSettingsTab = 'general';
    let mapLoading = false;
    let profileBot = null;
    let activeOreFilters = new Set();
    let battleState = {};
    let catalog = { items: {}, ships: {}, skills: {}, recipes: {}, lastFetched: null };
    let globalFactionStorage = [];
    let statsDaily = {};
    let profileReturnHomeIgnoreBlacklist = false;
    let commandAllFactionStorage = null;
    let factionWithdrawSortOrder = 'alpha';
    let caGiftSendAllRunning = false;
    let caDepositAllRunning = false;

    // ── Resolve a system ID + optional POI ID to display names using mapData. ──

    /** Resolve a system ID + optional POI ID to display names using mapData. */
    function resolveLocation(systemId, poiId) {
      if (!systemId) return '';
      const sys = mapData[systemId];
      const sysName = sys?.name || systemId;
      if (!poiId) return sysName;
      const poi = (sys?.pois || []).find(p => p.id === poiId);
      const poiName = poi?.name || poiId;
      return `${sysName} - ${poiName}`;
    }

    /** Look up a human-readable name from catalog for any ID (item, ship, skill, recipe). */
    function catalogName(id) {
      return catalog.items[id]?.name || catalog.ships[id]?.name
        || catalog.skills[id]?.name || catalog.recipes[id]?.name
        || id.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // ── WebSocket ──────────────────────────────────────────────
    let wsInitTimer = null;

    /** Fetch initial data via REST API as fallback if WebSocket is slow */
    async function fetchInitialData() {
      try {
        const [botsRes, discoveredRes, routinesRes, settingsRes, mapRes, statsRes, catalogRes, mainLogsRes, factionStorageRes] = await Promise.all([
          fetch('/api/bots').then(r => r.json()),
          fetch('/api/bots/discovered').then(r => r.json()),
          fetch('/api/routines').then(r => r.json()),
          fetch('/api/settings').then(r => r.json()),
          fetch('/data/map.json').then(r => r.json()),
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/catalog').then(r => r.json()),
          fetch('/api/logs/main').then(r => r.json()),
          fetch('/api/faction-storage').then(r => r.json()).catch(() => ({ items: [] })), // Best effort
        ]);

        // Merge discovered bots with status data (discovered gives us usernames even if not logged in)
        const statusBots = botsRes || [];
        const discoveredUsernames = discoveredRes?.usernames || [];
        window.discoveredBots = discoveredUsernames;
        const statusByUsername = new Map(statusBots.map(b => [b.username, b]));

        // Build complete bot list: include discovered bots even if no status yet
        const botSet = new Set([...discoveredUsernames, ...statusBots.map(b => b.username)]);
        bots = [...botSet].map(username => {
          const status = statusByUsername.get(username);
          if (status) return status;
          // Bot discovered but not logged in yet - show as idle
          return {
            username,
            state: 'idle',
            routine: null,
            credits: 0,
            fuel: 0,
            maxFuel: 0,
            cargo: 0,
            cargoMax: 0,
            location: 'unknown',
            system: 'unknown',
            poi: '',
            docked: false,
            lastAction: '',
            error: null,
             shipName: '-',
             shipClass: '',
             hull: 0,
            maxHull: 0,
            shield: 0,
            maxShield: 0,
            ammo: 0,
            inventory: [],
            storage: [],
            stats: { totalMined: 0, totalCrafted: 0, totalTrades: 0, totalProfit: 0, totalSystems: 0 },
          };
        });

        routines = routinesRes || [];
        settings = settingsRes || {};
        mapData = mapRes.systems || {};
        knownSystems = Object.entries(mapData).map(([id, sys]) => ({ id, name: sys?.name || id }));
        knownOres = [];
        statsDaily = statsRes || {};
        catalog = catalogRes || { items: {}, ships: {}, skills: {}, recipes: {}, lastFetched: null };
        // Load faction storage (shared warehouse)
        globalFactionStorage = (factionStorageRes?.items || factionStorageRes?.entries || []).map(e => ({
          item_id: e.itemId || e.item_id,
          name: e.name || '?',
          quantity: e.quantity || 0,
        }));
        renderCommandAllControls();
      } catch (err) {
        console.warn('Initial REST fetch failed, waiting for WebSocket:', err);
      }
    }

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);

      // Fallback: if WebSocket doesn't connect quickly, fetch data via REST
      clearTimeout(wsInitTimer);
      wsInitTimer = setTimeout(() => {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          console.warn('WebSocket slow, fetching initial data via REST...');
          fetchInitialData();
        }
      }, 500);

      ws.onopen = () => {
        clearTimeout(wsInitTimer);
        reconnectDelay = 1000;
      };

      ws.onclose = () => {
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 10000);
      };

      ws.onerror = () => {};

      ws.onmessage = (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        switch (msg.type) {
          case 'init':
            clearTimeout(wsInitTimer);
            bots = msg.bots || [];
            routines = msg.routines || [];
            settings = msg.settings || {};
            window.currentSettings = settings; // Sync for use in render functions
            knownSystems = msg.knownSystems || [];
            knownOres = msg.knownOres || [];
            mobileCapitol = msg.mobileCapitol || null;
            renderCommandAllControls();
            break;
          case 'mapData':
            mapData = msg.data.systems || msg.data || {};
            break;
          case 'catalog':
            catalog = msg.data;
            break;
          case 'statsDaily':
            statsDaily = msg.data;
            break;
          case 'status':
            bots = msg.bots || [];
            renderCommandAllControls();
            break;
          case 'execResult':
            handleExecResult(msg);
            break;
          case 'actionResult':
            if (msg.error) {
              caLog(`Error: ${msg.error}`);
            } else if (msg.message) {
              caLog(msg.message);
            }
            break;
        }
      };
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // COMMAND ALL TAB - Fleet-wide manual controls
    // ═══════════════════════════════════════════════════════════════════════════

    const COMMAND_ALL_DELAY_MS = 1000; // 1 second delay between each bot command

    /** Render the Command All controls panel */
    function renderCommandAllControls() {
      const controls = document.getElementById('commandAllControls');
      if (!controls) return;

      // Use first bot's system for POI list (assume all bots are in same system)
      const firstBotSystem = bots[0]?.system || '';
      const sysData = firstBotSystem && mapData[firstBotSystem] ? mapData[firstBotSystem] : null;
      
      // Build POI options from first bot's system
      const poiOpts = sysData && sysData.pois && sysData.pois.length > 0
        ? [...sysData.pois].sort((a, b) => ((a.name || a.id) || '').localeCompare((b.name || b.id) || '')).map(p => `<option value="${esc(p.id)}">${esc(p.name || p.id)} (${esc(p.type || '')})</option>`).join('')
        : '<option value="">No POIs known (explore system first)</option>';

      // Build system options for travel/jump
      const currentSys = bots[0]?.system || '';
      const jumpOpts = knownSystems.length > 0
        ? knownSystems
            .filter(s => s.id !== currentSys)
            .map(s => {
              const label = s.name ? `${s.name} (${s.id})` : s.id;
              return `<option value="${esc(s.id)}">${esc(label)}</option>`;
            }).join('')
        : '<option value="">No systems mapped</option>';

      // Build cargo item options from all bots combined
      const allCargoItems = new Map();
      for (const bot of bots) {
        if (bot.inventory) {
          for (const item of bot.inventory) {
            const existing = allCargoItems.get(item.itemId);
            if (existing) {
              existing.quantity += item.quantity;
            } else {
              allCargoItems.set(item.itemId, { name: item.name, quantity: item.quantity });
            }
          }
        }
      }
      const cargoOpts = allCargoItems.size > 0
        ? [...allCargoItems].map(([id, item]) => 
            `<option value="${esc(id)}">${esc(item.name)} (${item.quantity})</option>`
          ).join('')
        : '<option value="">No items in fleet cargo</option>';

      // Build storage item options from all bots combined
      const allStorageItems = new Map();
      for (const bot of bots) {
        if (bot.storage) {
          for (const item of bot.storage) {
            const existing = allStorageItems.get(item.itemId);
            if (existing) {
              existing.quantity += item.quantity;
            } else {
              allStorageItems.set(item.itemId, { name: item.name, quantity: item.quantity });
            }
          }
        }
      }
      const storOpts = allStorageItems.size > 0
        ? [...allStorageItems].map(([id, item]) => 
            `<option value="${esc(id)}">${esc(item.name)} (${item.quantity})</option>`
          ).join('')
        : '<option value="">No items in fleet storage</option>';

      // Build other bots list for trade/gift (all bots for fleet commands)
      const allBotOpts = bots.length > 0
        ? bots.map(b => `<option value="${esc(b.username)}">${esc(b.username)}</option>`).join('')
        : '<option value="">No bots available</option>';

      // Build gift item options from both cargo and storage across all bots
      const caGiftItems = new Map();
      for (const bot of bots) {
        // Add cargo items
        if (bot.inventory && bot.inventory.length > 0) {
          for (const item of bot.inventory) {
            const id = item.itemId || item.item_id;
            if (caGiftItems.has(id)) {
              caGiftItems.get(id).quantity += item.quantity || 1;
            } else {
              caGiftItems.set(id, { itemId: id, name: item.name || id, quantity: item.quantity || 1, source: 'cargo' });
            }
          }
        }
        // Add storage items
        if (bot.storage && bot.storage.length > 0) {
          for (const item of bot.storage) {
            const id = item.itemId || item.item_id;
            if (caGiftItems.has(id)) {
              caGiftItems.get(id).quantity += item.quantity || 1;
              caGiftItems.get(id).hasStorage = true;
            } else {
              caGiftItems.set(id, { itemId: id, name: item.name || id, quantity: item.quantity || 1, source: 'storage', hasStorage: true });
            }
          }
        }
      }
      const caGiftItemOpts = caGiftItems.size > 0
        ? [...caGiftItems.values()].map(i => `<option value="${esc(i.itemId)}" data-source="${i.source}">${esc(i.name)} (${i.quantity})</option>`).join('')
        : '<option value="">No items in fleet</option>';

      controls.innerHTML = `
        <div class="cmd-group">
          <label>Travel (All Bots)</label>
          <select id="ca-travel-poi">${poiOpts}</select>
          <button class="primary sm" onclick="caExec('travel',{target_poi:val('ca-travel-poi')})">Go</button>
        </div>

        <div class="cmd-group">
          <label>Jump To (All Bots)</label>
          <select id="ca-jump-sys">${jumpOpts}</select>
          <button class="primary sm" id="ca-jump-btn" onclick="caExec('jump',{target_system:val('ca-jump-sys')})">Jump</button>
        </div>

        <div class="cmd-group">
          <button class="sm" onclick="caExec('dock')">Dock All</button>
          <button class="sm" onclick="caExec('undock')">Undock All</button>
        </div>

        <div class="cmd-group">
          <button class="primary sm" onclick="caExec('mine')">Mine All</button>
          <button class="sm" onclick="caExec('scan')">Scan All</button>
        </div>

        <div class="cmd-group">
          <button class="sm" onclick="caExec('refuel')">Refuel All</button>
          <button class="sm" onclick="caExec('repair')">Repair All</button>
        </div>

        <div class="cmd-group" style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px">
          <label style="color:var(--text-bright);font-weight:600">Fleet Cargo Operations</label>
        </div>

        <div class="cmd-group">
          <label>Sell (All Bots)</label>
          <select id="ca-sell-item">${cargoOpts}</select>
          <input type="number" id="ca-sell-qty" min="1" value="1">
          <button class="sm" onclick="caExec('sell',{item_id:val('ca-sell-item'),quantity:intVal('ca-sell-qty')})">Sell</button>
        </div>

        <div class="cmd-group">
          <label>Deposit (All Bots)</label>
          <select id="ca-dep-item">${cargoOpts}</select>
          <input type="number" id="ca-dep-qty" min="1" value="1">
          <button class="sm" onclick="caExec('deposit_items',{item_id:val('ca-dep-item'),quantity:intVal('ca-dep-qty')})">Deposit</button>
        </div>

        <div class="cmd-group">
          <label>Withdraw (All Bots)</label>
          <select id="ca-wit-item">${storOpts}</select>
          <input type="number" id="ca-wit-qty" min="1" value="1">
          <button class="sm" onclick="caExec('withdraw_items',{item_id:val('ca-wit-item'),quantity:intVal('ca-wit-qty')})">Withdraw</button>
        </div>

        <div class="cmd-group">
          <label>Faction Withdraw (All Bots)</label>
          <select id="ca-fac-wit-item">${getCommandAllFactionWithdrawOpts()}</select>
          <input type="number" id="ca-fac-wit-qty" min="1" value="1" style="width:90px">
          <button class="sm" onclick="caFactionWithdraw()">Withdraw</button>
          <button class="sm" onclick="caRefreshFactionStorage()" title="Reload faction storage list">Refresh</button>
          <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);cursor:pointer;white-space:nowrap">
            <input type="checkbox" id="ca-fac-wit-sort" onchange="toggleCommandAllFactionWithdrawSort()"${factionWithdrawSortOrder === 'quantity' ? ' checked' : ''}>
            Sort by Qty
          </label>
        </div>

        <div class="cmd-group">
          <label>Jettison (All Bots)</label>
          <select id="ca-jettison-item">${cargoOpts}</select>
          <input type="number" id="ca-jettison-qty" min="1" value="1">
          <button class="danger sm" onclick="caExec('jettison',{item_id:val('ca-jettison-item'),quantity:intVal('ca-jettison-qty')})">Jettison</button>
        </div>

        <div class="cmd-group" style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px">
          <label style="color:var(--text-bright);font-weight:600">Fleet Transfers</label>
        </div>

        <div class="cmd-group">
          <label>Gift Item (All Bots → Target)</label>
          <select id="ca-gift-source">
            <option value="cargo">From Cargo</option>
            <option value="storage" selected>From Storage</option>
          </select>
          <select id="ca-gift-target">${allBotOpts}</select>
          <select id="ca-gift-item">${caGiftItemOpts}</select>
          <input type="number" id="ca-gift-qty" min="1" value="1">
          <button class="sm" onclick="caSendGift()">Send</button>
        </div>

        <div class="cmd-group">
          <label>Gift Send All (All Bots → Target)</label>
          <select id="ca-giftall-target">${allBotOpts}</select>
          <input type="text" id="ca-giftall-custom" placeholder="Or enter player name..." style="width:140px;font-size:12px;padding:4px 8px">
          <button class="primary sm" onclick="caGiftSendAll()">Start Queue</button>
          <button class="sm" onclick="caStopGiftSendAll()">Stop</button>
        </div>

        <div class="cmd-group">
          <label>Gift Queue Status</label>
          <span id="ca-gift-queue-status" style="font-size:11px;color:var(--text-dim)">Idle</span>
        </div>

        <div class="cmd-group">
          <label>Deposit All (All Bots)</label>
          <select id="ca-depall-source">
            <option value="cargo_to_station">Cargo → Station</option>
            <option value="cargo_to_faction">Cargo → Faction</option>
            <option value="station_to_faction">Station → Faction</option>
            <option value="station_to_cargo">Station → Cargo</option>
            <option value="faction_to_station">Faction → Station</option>
          </select>
          <button class="primary sm" onclick="caDepositAll()">Start Queue</button>
          <button class="sm" onclick="caStopDepositAll()">Stop</button>
        </div>

        <div class="cmd-group">
          <label>Deposit Queue Status</label>
          <span id="ca-depall-queue-status" style="font-size:11px;color:var(--text-dim)">Idle</span>
        </div>

        <div class="cmd-group">
          <label>Send Credits (All Bots → Target)</label>
          <select id="ca-credits-target">${allBotOpts}</select>
          <input type="number" id="ca-credits-amount" min="1" value="100" style="width:90px">
          <button class="sm" onclick="caExec('send_gift',{recipient:val('ca-credits-target'),credits:intVal('ca-credits-amount')})">Send</button>
        </div>

        <div class="cmd-group" style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px">
          <label style="color:var(--text-bright);font-weight:600">Status Commands</label>
        </div>

        <div class="cmd-group">
          <button class="sm" onclick="caExec('get_status')">Status All</button>
          <button class="sm" onclick="caExec('get_cargo')">Cargo All</button>
          <button class="sm" onclick="caExec('view_storage')">Storage All</button>
          <button class="sm" onclick="caExec('view_market')">Market All</button>
          <button class="sm" onclick="caExec('get_system')">System All</button>
          <button class="sm" onclick="caExec('get_nearby')">Nearby All</button>
        </div>

        <div class="cmd-group">
          <label>Custom Command (All Bots)</label>
          <input type="text" id="ca-custom-cmd" placeholder="command" style="min-width:100px">
          <input type="text" id="ca-custom-params" placeholder='{"key":"val"}' style="min-width:160px">
          <button class="primary sm" onclick="caExecCustom()">Run</button>
        </div>
      `;
    }

    /** Execute a command on all bots with delay between each */
    function caExec(command, params) {
      // Include all bots: running OR idle (command_receiver routine bots)
      const allBots = bots.filter(b => b.state === 'running' || b.state === 'idle');
      if (allBots.length === 0) {
        caLog(`<span class="resp-warn">No bots available to command</span>`);
        return;
      }

      const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
      const paramStr = params ? ' ' + JSON.stringify(params) : '';
      caLog(`<span class="resp-cmd">${ts} > FLEET: ${esc(command)}${esc(paramStr)} (${allBots.length} bots)</span>`);

      // Execute on each bot with delay
      let index = 0;
      function executeNext() {
        if (index >= allBots.length) return;

        const bot = allBots[index];
        const botTs = new Date().toLocaleTimeString('en-US', { hour12: false });

        sendExec(bot.username, command, params, (result) => {
          const status = result.ok ? '<span class="resp-ok">✓</span>' : `<span class="resp-err">✗ ${esc(result.error || 'unknown')}</span>`;
          const stateLabel = bot.state === 'running' ? '(running)' : '(idle)';
          caLog(`<span class="resp-bot">${esc(bot.username)} ${stateLabel}:</span> ${status}`);
        });

        index++;
        if (index < allBots.length) {
          setTimeout(executeNext, COMMAND_ALL_DELAY_MS);
        }
      }

      executeNext();
    }

    function caExecCustom() {
      const cmd = val('ca-custom-cmd');
      if (!cmd) {
        caLog('<span class="resp-err">Enter a command</span>');
        return;
      }
      let params = undefined;
      const raw = val('ca-custom-params').trim();
      if (raw) {
        try { params = JSON.parse(raw); } catch (e) {
          caLog(`<span class="resp-err">Invalid JSON params: ${esc(e.message)}</span>`);
          return;
        }
      }
      caExec(cmd, params);
    }

    /** Get faction storage options for command-all faction withdraw dropdown */
    function getCommandAllFactionWithdrawOpts() {
      if (commandAllFactionStorage === null) {
        return '<option value="">Click Refresh to load</option>';
      }
      if (!commandAllFactionStorage || commandAllFactionStorage.length === 0) {
        return '<option value="">Empty or not available</option>';
      }

      let items = [...commandAllFactionStorage];

      // Sort items based on sort order
      if (factionWithdrawSortOrder === 'alpha') {
        items = items.sort((a, b) => {
          const nameA = (a.name || a.item_name || a.item_id || a.id || '').toLowerCase();
          const nameB = (b.name || b.item_name || b.item_id || b.id || '').toLowerCase();
          return nameA.localeCompare(nameB);
        });
      } else if (factionWithdrawSortOrder === 'quantity') {
        items = items.sort((a, b) => {
          const qtyA = a.quantity || a.count || 0;
          const qtyB = b.quantity || b.count || 0;
          return qtyB - qtyA; // Descending order (highest quantity first)
        });
      }

      return items.map(i => {
        const id = i.item_id || i.id || '';
        const name = i.name || i.item_name || id;
        const qty = i.quantity || i.count || 0;
        return `<option value="${esc(id)}" data-max="${qty}">${esc(name)} (${qty})</option>`;
      }).join('');
    }

    /** Refresh faction storage for command-all tab */
    function caRefreshFactionStorage() {
      if (bots.length === 0) {
        caLog('<span class="resp-warn">No bots available to fetch faction storage</span>');
        return;
      }

      const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
      caLog(`<span class="resp-cmd">${ts} > FLEET: view_faction_storage</span>`);

      // Use first available bot to fetch faction storage
      const bot = bots.find(b => b.state === 'running' || b.state === 'idle');
      if (!bot) {
        caLog('<span class="resp-err">No idle or running bot to fetch faction storage</span>');
        return;
      }

      sendExec(bot.username, 'view_faction_storage', undefined, (result) => {
        if (result.ok && result.data) {
          const items = result.data.items || result.data.storage || [];
          commandAllFactionStorage = items;
          caLog(`<span class="resp-ok">Loaded ${items.length} faction storage items</span>`);
          renderCommandAllControls();
        } else {
          commandAllFactionStorage = [];
          caLog(`<span class="resp-err">Failed to load faction storage: ${esc(result.error || 'not at station')}</span>`);
          renderCommandAllControls();
        }
      });
    }

    /** Toggle sort order for command-all faction withdraw dropdown */
    function toggleCommandAllFactionWithdrawSort() {
      const checkbox = document.getElementById('ca-fac-wit-sort');
      if (checkbox) {
        factionWithdrawSortOrder = checkbox.checked ? 'quantity' : 'alpha';
        renderCommandAllControls();
      }
    }

    /** Send a single gift from all bots using the storage command */
    function caSendGift() {
      const source = val('ca-gift-source');
      const recipient = val('ca-gift-target');
      const itemId = val('ca-gift-item');
      const quantity = intVal('ca-gift-qty');

      if (!recipient) {
        caLog('<span class="resp-err">Select a recipient</span>');
        return;
      }
      if (!itemId) {
        caLog('<span class="resp-err">Select an item</span>');
        return;
      }

      // Include all bots: running OR idle
      const allBots = bots.filter(b => b.state === 'running' || b.state === 'idle');
      if (allBots.length === 0) {
        caLog('<span class="resp-warn">No bots available to command</span>');
        return;
      }

      const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
      caLog(`<span class="resp-cmd">${ts} > FLEET: gifting ${quantity}x ${itemId} to ${recipient} (from ${source}) (${allBots.length} bots)</span>`);

      // Execute on each bot with delay
      let index = 0;
      function executeNext() {
        if (index >= allBots.length) return;

        const bot = allBots[index];
        const command = 'storage';
        const params = {
          action: 'deposit',
          target: recipient,
          item_id: itemId,
          quantity: quantity
        };
        if (source === 'storage') {
          params.source = 'storage';
        }

        sendExec(bot.username, command, params, (result) => {
          const status = result.ok ? '<span class="resp-ok">✓</span>' : `<span class="resp-err">✗ ${esc(result.error || 'unknown')}</span>`;
          const stateLabel = bot.state === 'running' ? '(running)' : '(idle)';
          caLog(`<span class="resp-bot">${esc(bot.username)} ${stateLabel}:</span> ${status}`);
        });

        index++;
        if (index < allBots.length) {
          setTimeout(executeNext, COMMAND_ALL_DELAY_MS);
        }
      }

      executeNext();
    }

    // ── Command All Gift Send All Queue System ───────────────────────────────

    let caGiftSendAllQueue = null;  // { items: Array<{bot, item_id, quantity, target}>, index: number }

    // ── Command All Deposit All Queue System ───────────────────────────────

    /** Update the command all gift queue status display */
    function caUpdateGiftQueueStatus() {
      const statusEl = document.getElementById('ca-gift-queue-status');
      if (!statusEl) return;

      if (!caGiftSendAllRunning) {
        statusEl.textContent = 'Idle';
        statusEl.style.color = 'var(--text-dim)';
        return;
      }

      statusEl.textContent = 'Running';
      statusEl.style.color = 'var(--green)';
    }

    /** Process a single bot's gift queue sequentially */
    function caProcessBotGiftQueue(botUsername, queue) {
      if (!caGiftSendAllRunning || queue.length === 0) return;

      let index = 0;

      function sendNext() {
        if (!caGiftSendAllRunning || index >= queue.length) {
          // Check if all queues are done
          caCheckAllQueuesComplete();
          return;
        }

        const item = queue[index];
        const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
        caLog(`<span class="resp-cmd">${ts} > ${esc(item.bot.username)} gifting ${item.quantity}x ${item.item_id} to ${item.target}</span>`);

        const command = 'storage';
        const params = {
          action: 'deposit',
          source: 'storage',
          target: item.target,
          item_id: item.item_id,
          quantity: item.quantity
        };

        sendExec(item.bot.username, command, params, (result) => {
          if (result.ok) {
            caLog(`<span class="resp-ok">${esc(item.bot.username)}: OK</span>`);
          } else {
            caLog(`<span class="resp-err">${esc(item.bot.username)}: Failed: ${esc(result.error || 'unknown')}</span>`);
          }

          index++;
          // Wait 10 seconds before next item for this bot (mutation cooldown)
          setTimeout(sendNext, 10000);
        });
      }

      sendNext();
    }

    /** Check if all bot queues are complete */
    function caCheckAllQueuesComplete() {
      // Since we don't track individual queues, just wait a bit and check if any are still running
      // For simplicity, assume complete after all have started and no new logs
      if (caGiftSendAllRunning) {
        setTimeout(() => {
          if (caGiftSendAllRunning) {
            caLog(`<span class="resp-ok">Fleet Gift Send All complete! All items sent.</span>`);
            caGiftSendAllRunning = false;
            caUpdateGiftQueueStatus();
          }
        }, 11000); // After last possible command
      }
    }

    /** Start the command all deposit all queue */
    function caDepositAll() {
      if (caDepositAllRunning) {
        caLog('<span class="resp-err">Fleet Deposit All already running</span>');
        return;
      }

      const mode = val('ca-depall-source');
      if (!mode) {
        caLog('<span class="resp-err">Select a deposit mode</span>');
        return;
      }

      // Include all bots: running OR idle
      const allBots = bots.filter(b => b.state === 'running' || b.state === 'idle');
      if (allBots.length === 0) {
        caLog('<span class="resp-warn">No bots available to command</span>');
        return;
      }

      // Build per-bot queues
      const botQueues = {};
      let totalItems = 0;
      for (const bot of allBots) {
        const queue = caBuildDepositQueue(bot, mode);
        if (queue && queue.items.length > 0) {
          botQueues[bot.username] = queue.items;
          totalItems += queue.items.length;
        }
      }

      if (totalItems === 0) {
        caLog('<span class="resp-err">No items to deposit in fleet</span>');
        return;
      }

      caDepositAllRunning = true;
      caLog(`<span class="resp-cmd">Starting Fleet Deposit All: ${mode} (${totalItems} items across ${Object.keys(botQueues).length} bots)</span>`);
      caUpdateDepositQueueStatus();

      // Start processing each bot's queue in parallel
      for (const botUsername in botQueues) {
        const bot = allBots.find(b => b.username === botUsername);
        caProcessBotDepositQueue(bot, botQueues[botUsername]);
      }
    }

    /** Build deposit queue for a bot based on mode */
    function caBuildDepositQueue(bot, mode) {
      const cargo = bot.inventory || [];
      const storage = bot.storage || [];

      const items = [];

      if (mode === 'cargo_to_station') {
        for (const item of cargo) {
          const itemId = item.itemId || item.item_id;
          const qty = item.quantity || item.count || 1;
          if (qty > 0 && itemId) {
            items.push({ item_id: itemId, quantity: qty, target: 'self', source: 'cargo' });
          }
        }
      } else if (mode === 'cargo_to_faction') {
        for (const item of cargo) {
          const itemId = item.itemId || item.item_id;
          const qty = item.quantity || item.count || 1;
          if (qty > 0 && itemId) {
            items.push({ item_id: itemId, quantity: qty, target: 'faction', source: 'cargo' });
          }
        }
      } else if (mode === 'station_to_faction') {
        for (const item of storage) {
          const itemId = item.itemId || item.item_id;
          const qty = item.quantity || item.count || 1;
          if (qty > 0 && itemId) {
            items.push({ item_id: itemId, quantity: qty, target: 'faction', source: 'storage' });
          }
        }
      } else if (mode === 'station_to_cargo') {
        for (const item of storage) {
          const itemId = item.itemId || item.item_id;
          const qty = item.quantity || item.count || 1;
          if (qty > 0 && itemId) {
            items.push({ item_id: itemId, quantity: qty, target: 'self', source: 'storage', action: 'withdraw' });
          }
        }
      } else if (mode === 'faction_to_station') {
        // This would need faction storage data, but for now assume not implemented or handle differently
        // For simplicity, skip or note that faction withdrawal is handled separately
        caLog(`<span class="resp-warn">Faction to Station not implemented in Command All</span>`);
        return null;
      }

      return { items };
    }

    /** Process a single bot's deposit queue sequentially */
    function caProcessBotDepositQueue(bot, queue) {
      if (!caDepositAllRunning || queue.length === 0) return;

      let index = 0;

      function sendNext() {
        if (!caDepositAllRunning || index >= queue.length) {
          caCheckDepositQueuesComplete();
          return;
        }

        const item = queue[index];
        const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
        const verb = item.action === 'withdraw' ? 'withdrawing' : 'depositing';
        const targetDesc = item.target === 'faction' ? 'faction' : item.action === 'withdraw' ? 'cargo' : 'station';
        caLog(`<span class="resp-cmd">${ts} > ${esc(bot.username)} ${verb} ${item.quantity}x ${item.item_id} to ${targetDesc}</span>`);

        let command;
        const params = {
          item_id: item.item_id,
          quantity: item.quantity,
        };

        if (item.action === 'withdraw') {
          command = 'withdraw_items';
          params.source = item.source;
        } else {
          command = 'deposit_items';
          params.source = item.source;
          if (item.target === 'faction') {
            params.target = item.target;
          }
        }

        sendExec(bot.username, command, params, (result) => {
          if (result.ok) {
            caLog(`<span class="resp-ok">${esc(bot.username)}: OK</span>`);
          } else {
            caLog(`<span class="resp-err">${esc(bot.username)}: Failed: ${esc(result.error || 'unknown')}</span>`);
          }

          index++;
          setTimeout(sendNext, 10000);
        });
      }

      sendNext();
    }

    /** Check if all deposit queues are complete */
    function caCheckDepositQueuesComplete() {
      if (caDepositAllRunning) {
        setTimeout(() => {
          if (caDepositAllRunning) {
            caLog(`<span class="resp-ok">Fleet Deposit All complete! All items transferred.</span>`);
            caDepositAllRunning = false;
            caUpdateDepositQueueStatus();
          }
        }, 11000);
      }
    }

    /** Stop the command all deposit all queue */
    function caStopDepositAll() {
      if (!caDepositAllRunning) {
        caLog('<span class="resp-err">No fleet deposit queue running</span>');
        return;
      }

      caDepositAllRunning = false;
      caLog(`<span class="resp-err">Fleet Deposit All stopped. Remaining items will not be transferred.</span>`);
      caUpdateDepositQueueStatus();
    }

    /** Update the command all deposit queue status display */
    function caUpdateDepositQueueStatus() {
      const statusEl = document.getElementById('ca-depall-queue-status');
      if (!statusEl) return;

      if (!caDepositAllRunning) {
        statusEl.textContent = 'Idle';
        statusEl.style.color = 'var(--text-dim)';
        return;
      }

      statusEl.textContent = 'Running';
      statusEl.style.color = 'var(--green)';
    }

    /** Start the command all gift send all queue */
    function caGiftSendAll() {
      if (caGiftSendAllRunning) {
        caLog('<span class="resp-err">Fleet Gift Send All already running</span>');
        return;
      }

      let targetName = val('ca-giftall-target');
      if (!targetName) {
        targetName = val('ca-giftall-custom');
      }

      if (!targetName) {
        caLog('<span class="resp-err">Please select or enter a target recipient</span>');
        return;
      }

      // Include all bots: running OR idle
      const allBots = bots.filter(b => b.state === 'running' || b.state === 'idle');
      if (allBots.length === 0) {
        caLog('<span class="resp-warn">No bots available to command</span>');
        return;
      }

      // Build per-bot queues from storage
      const botQueues = {};
      let totalItems = 0;
      for (const bot of allBots) {
        const storage = bot.storage || [];
        const botItems = [];
        for (const item of storage) {
          const itemId = item.itemId || item.item_id;
          const qty = item.quantity || item.count || 1;
          if (qty > 0 && itemId) {
            botItems.push({ bot, item_id: itemId, quantity: qty, target: targetName });
          }
        }
        if (botItems.length > 0) {
          botQueues[bot.username] = botItems;
          totalItems += botItems.length;
        }
      }

      if (totalItems === 0) {
        caLog('<span class="resp-err">No items to gift in fleet storage</span>');
        return;
      }

      caGiftSendAllRunning = true;
      caLog(`<span class="resp-cmd">Starting Fleet Gift Send All → ${targetName} (${totalItems} items across ${Object.keys(botQueues).length} bots)</span>`);
      caUpdateGiftQueueStatus();

      // Start processing each bot's queue in parallel
      for (const botUsername in botQueues) {
        caProcessBotGiftQueue(botUsername, botQueues[botUsername]);
      }
    }

    /** Stop the command all gift send all queue */
    function caStopGiftSendAll() {
      if (!caGiftSendAllRunning) {
        caLog('<span class="resp-err">No fleet gift queue running</span>');
        return;
      }

      caGiftSendAllRunning = false;
        caLog(`<span class="resp-err">Fleet Gift Send All stopped. Remaining items will not be sent.</span>`);
      caUpdateGiftQueueStatus();
    }

    /** Execute faction withdraw for all bots using two-step queue */
    function caFactionWithdraw() {
      const itemId = val('ca-fac-wit-item');
      const qty = intVal('ca-fac-wit-qty');

      if (!itemId) {
        caLog('<span class="resp-err">Select an item to withdraw</span>');
        return;
      }

      // Include all bots: running OR idle (command_receiver routine bots)
      const allBots = bots.filter(b => b.state === 'running' || b.state === 'idle');
      if (allBots.length === 0) {
        caLog('<span class="resp-warn">No bots available to command</span>');
        return;
      }

      const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
      caLog(`<span class="resp-cmd">${ts} > FLEET: Faction Withdraw ${qty}x ${esc(itemId)} (${allBots.length} bots)</span>`);
      caLog(`<span class="resp-info">Step 1: Faction → Personal Storage, Step 2: Personal Storage → Cargo</span>`);

      // Execute on each bot with delay
      let index = 0;
      function executeNext() {
        if (index >= allBots.length) return;

        const bot = allBots[index];
        const botUsername = bot.username;

        // Step 1: Withdraw from faction storage to personal storage
        sendExec(botUsername, 'storage', { action: 'deposit', target: 'self', item_id: itemId, quantity: qty, source: 'faction' }, (result) => {
          const status = result.ok ? '<span class="resp-ok">✓ Step 1 done</span>' : `<span class="resp-err">✗ Step 1 failed: ${esc(result.error || 'unknown')}</span>`;
          caLog(`<span class="resp-bot">${esc(botUsername)}:</span> ${status}`);

          if (result.ok) {
            // Step 2: After successful faction withdraw, move from personal storage to cargo
            setTimeout(() => {
              sendExec(botUsername, 'withdraw_items', { item_id: itemId, quantity: qty }, (result2) => {
                const status2 = result2.ok ? '<span class="resp-ok">✓ Step 2 done</span>' : `<span class="resp-err">✗ Step 2 failed: ${esc(result2.error || 'unknown')}</span>`;
                caLog(`<span class="resp-bot">${esc(botUsername)}:</span> ${status2}`);
              });
            }, 500); // Small delay between steps
          }
        });

        index++;
        if (index < allBots.length) {
          setTimeout(executeNext, COMMAND_ALL_DELAY_MS);
        }
      }

      executeNext();
    }

    /** Log to the Command All log panel */
    function caLog(html) {
      const log = document.getElementById('commandAllLog');
      if (!log) return;
      const div = document.createElement('div');
      div.className = 'resp-entry';
      div.innerHTML = html;
      log.prepend(div);
      // Cap DOM entries
      while (log.children.length > 300) log.removeChild(log.lastChild);
      log.scrollTop = 0;
    }

    /** Clear the command all log */
    function clearCommandAllLog() {
      const log = document.getElementById('commandAllLog');
      if (log) log.innerHTML = '';
    }

    // Helper functions
    let execCallbacks = new Map();

    function val(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    function intVal(id) {
      const v = val(id);
      const n = parseInt(v);
      return isNaN(n) ? 0 : n;
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function sendExec(bot, command, params, callback) {
      const seq = Date.now();
      const msg = { type: 'exec', bot, command, params, _seq: seq };
      execCallbacks.set(seq, callback);
      ws.send(JSON.stringify(msg));
    }

    function handleExecResult(msg) {
      const callback = execCallbacks.get(msg._seq);
      if (callback) {
        execCallbacks.delete(msg._seq);
        callback(msg);
      }
    }

    // Initialize
    connect();
  </script>
</body>
